<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1030"/>
      <stop offset="100%" stop-color="#06060c"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#d4a574" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#5048C4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#5048C4" stroke-width="1.5" opacity="0.4"/>
  <circle cx="256" cy="256" r="120" fill="none" stroke="#7B50D4" stroke-width="1.5" opacity="0.3"/>
  <circle cx="256" cy="256" r="80" fill="none" stroke="#A840B8" stroke-width="1.5" opacity="0.3"/>
  <circle cx="256" cy="256" r="40" fill="url(#glow)"/>
  <!-- Toroidal field lines -->
  <ellipse cx="256" cy="256" rx="140" ry="60" fill="none" stroke="#d4a574" stroke-width="1" opacity="0.3" transform="rotate(0 256 256)"/>
  <ellipse cx="256" cy="256" rx="140" ry="60" fill="none" stroke="#d4a574" stroke-width="1" opacity="0.3" transform="rotate(60 256 256)"/>
  <ellipse cx="256" cy="256" rx="140" ry="60" fill="none" stroke="#d4a574" stroke-width="1" opacity="0.3" transform="rotate(120 256 256)"/>
  <!-- Center symbol -->
  <text x="256" y="270" text-anchor="middle" font-family="Georgia,serif" font-size="48" fill="#d4a574" font-weight="300">RCT</text>
  <text x="256" y="310" text-anchor="middle" font-family="Georgia,serif" font-size="16" fill="#8a6b2e" letter-spacing="4">AETHERIA</text>
</svg>
