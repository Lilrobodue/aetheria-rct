<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#231540"/>
      <stop offset="100%" stop-color="#0c0818"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="38%">
      <stop offset="0%" stop-color="#d4a574" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#7B50D4" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#ffe4be"/>
      <stop offset="50%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#c08a50"/>
    </linearGradient>
    <linearGradient id="ring-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0d0a0"/>
      <stop offset="100%" stop-color="#c08a50"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <circle cx="256" cy="236" r="200" fill="url(#glow)"/>
  <!-- Purple outer ring -->
  <circle cx="256" cy="236" r="164" fill="none" stroke="#8B60E0" stroke-width="2" opacity="0.4"/>
  <!-- Toroidal field lines -->
  <ellipse cx="256" cy="236" rx="125" ry="48" fill="none" stroke="#d4a574" stroke-width="1.2" opacity="0.18" transform="rotate(0 256 236)"/>
  <ellipse cx="256" cy="236" rx="125" ry="48" fill="none" stroke="#d4a574" stroke-width="1.2" opacity="0.18" transform="rotate(60 256 236)"/>
  <ellipse cx="256" cy="236" rx="125" ry="48" fill="none" stroke="#d4a574" stroke-width="1.2" opacity="0.18" transform="rotate(120 256 236)"/>
  <!-- Main golden ring -->
  <circle cx="256" cy="236" r="116" fill="none" stroke="url(#ring-grad)" stroke-width="3.5" opacity="0.9"/>
  <!-- A -->
  <text x="256" y="262" text-anchor="middle" font-family="Georgia,serif" font-size="100" fill="url(#gold)" font-weight="400">A</text>
  <!-- 432 -->
  <text x="256" y="298" text-anchor="middle" font-family="Georgia,serif" font-size="28" fill="#9B70E8" letter-spacing="6" font-weight="400">432</text>
  <!-- RCT -->
  <text x="256" y="420" text-anchor="middle" font-family="Georgia,serif" font-size="32" fill="#d4a574" letter-spacing="16" opacity="0.75" font-weight="400">RCT</text>
</svg>
